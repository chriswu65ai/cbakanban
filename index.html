<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kanban with no AI</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app" id="appRoot">
      <header class="topbar">
        <div class="brand">
          <div class="logo-mark"></div>
          <div>
            <h1>Kanban with no AI</h1>
            <p>Organising the globe-trotting CBA analyst</p>
          </div>
        </div>
        <div class="controls"></div>
      </header>

      <section id="stockWidget" class="stock-card" aria-live="polite">
        <div class="stock-toolbar">
          <strong id="stockPrice">A$--</strong>
          <span id="stockChange" class="muted">--</span>
          <select id="stockRange" aria-label="Stock timeframe">
            <option value="30d">30d</option>
            <option value="90d">90d</option>
            <option value="1y">1y</option>
            <option value="3y">3y</option>
            <option value="all">All</option>
          </select>
        </div>
        <div class="tradingview-widget-container" id="tradingViewWidget"></div>
        <p id="stockStatus" class="muted">Range: 30d</p>
      </section>

      <nav id="boardTabs" class="board-tabs"></nav>

      <main>
        <section id="columns" class="columns"></section>
      </main>

      <footer class="bottom-controls">
        <button id="addCardBtn" class="primary-btn">+ Add Card</button>
        <button id="addBoardBtn" class="primary-btn">+ Add Board</button>
        <button id="deleteBoardBtn" class="ghost-btn">Delete Current Board</button>
        <div class="footer-right-controls">
          <button id="themeToggle" class="primary-btn">Toggle Theme</button>
          <label class="view-select-wrap" aria-label="View mode">
            <select id="viewMode">
              <option value="auto">Auto</option>
              <option value="mobile">Mobile</option>
              <option value="desktop">Desktop</option>
            </select>
          </label>
        </div>
      </footer>
    </div>

    <dialog id="cardDialog">
      <form id="cardForm" method="dialog">
        <h3 id="dialogTitle">Add Card</h3>
        <label>Title <input name="title" required /></label>
        <label>Notes <textarea name="notes"></textarea></label>
        <label>Due date
          <div class="due-date-row">
            <select name="dueDay" id="dueDay"><option value="">Day</option></select>
            <select name="dueMonth" id="dueMonth"><option value="">Month</option></select>
            <select name="dueYear" id="dueYear"><option value="">Year</option></select>
          </div>
        </label>
        <label>Priority
          <select name="priority">
            <option>Low</option>
            <option selected>Medium</option>
            <option>High</option>
          </select>
        </label>
        <label>Recurrence
          <select name="recurrence">
            <option value="none">None</option>
            <option value="daily">Daily</option>
            <option value="weekly">Weekly</option>
          </select>
        </label>
        <label>Checklist (one item per line)
          <textarea name="checklist" placeholder="Buy oats\nBuy whey"></textarea>
        </label>
        <menu>
          <button value="cancel" type="reset" id="cancelDialog">Cancel</button>
          <button value="default" type="submit" class="primary-btn">Save</button>
        </menu>
        <button id="deleteCardBtn" type="button" class="ghost-btn hidden">Delete this card</button>
      </form>
    </dialog>

    <script src="app.js" type="module"></script>
  </body>
</html>
